services:
  api:
    build: .
    container_name: scaper-prod
    ports:
      - "8080:8080"
    volumes:
      - app-temp:/app/temp_files
      - app-jobs:/app/jobs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 1G

volumes:
  app-temp:
  app-jobs:
