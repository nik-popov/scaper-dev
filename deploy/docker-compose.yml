services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: super-scraper-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: app_user
      RABBITMQ_DEFAULT_PASS: app_password
      RABBITMQ_DEFAULT_VHOST: app_vhost
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    restart: unless-stopped

  api:
    image: nikiconluxury/scaper-dev-api:latest
    container_name: super-scraper
    ports:
      - "8080:8080"
      - "8265:8265"
    env_file: ./env
    restart: unless-stopped
    depends_on:
      - rabbitmq

  consumer:
    image: nikiconluxury/scaper-dev-consumer:latest
    container_name: super-scraper-consumer
    network_mode: host
    env_file: ./env
    restart: unless-stopped
    depends_on:
      - rabbitmq

volumes:
  rabbitmq_data:
