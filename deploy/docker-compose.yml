services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: super-scraper-rabbitmq
    network_mode: host
    environment:
      RABBITMQ_DEFAULT_USER: app_user
      RABBITMQ_DEFAULT_PASS: app_password
      RABBITMQ_DEFAULT_VHOST: app_vhost
      RABBITMQ_SERVER_ADDITIONAL_ERL_ARGS: "-rabbit handshake_timeout 30000"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s

  api:
    image: nikiconluxury/scaper-dev-api:latest
    container_name: super-scraper
    network_mode: host
    env_file: ./env
    restart: unless-stopped
    depends_on:
      rabbitmq:
        condition: service_healthy

  consumer:
    image: nikiconluxury/scaper-dev-consumer:latest
    container_name: super-scraper-consumer
    network_mode: host
    env_file: ./env
    restart: unless-stopped
    depends_on:
      rabbitmq:
        condition: service_healthy

volumes:
  rabbitmq_data:
